<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thank You | Sachin Patel</title>

    <meta name="description" content="Thank you for contacting Sachin Patel. Your message has been received.">

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:"Space Grotesk",sans-serif;
            background:#0f172a;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .card{
            max-width:600px;
            width:100%;
            text-align:center;
            background:#111827;
            border:1px solid rgba(255,255,255,.08);
            border-radius:18px;
            padding:50px 35px;
            box-shadow:0 20px 60px rgba(0,0,0,.35);
        }

        .icon{
            width:90px;
            height:90px;
            margin:0 auto 25px;
            border-radius:50%;
            background:#00D4AA;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:42px;
            color:#0f172a;
            font-weight:bold;
        }

        h1{
            font-size:2.3rem;
            margin-bottom:15px;
        }

        p{
            color:#cbd5e1;
            line-height:1.8;
            margin-bottom:35px;
        }

        .btn{
            display:inline-block;
            padding:14px 30px;
            border-radius:12px;
            text-decoration:none;
            background:#00D4AA;
            color:#0f172a;
            font-weight:600;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-3px);
        }

        .small{
            margin-top:25px;
            font-size:.9rem;
            color:#94a3b8;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="icon">✓</div>

    <h1>Thank You!</h1>

    <p>
        Your message has been sent successfully.
        <br><br>
        I appreciate you reaching out and will get back to you as soon as possible.
    </p>

    <a class="btn" href="index.html">
        ← Back to Portfolio
    </a>

    <div class="small">
        Sachin Patel • Operations Research Scientist
    </div>

</div>

</body>
</html>
